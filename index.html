<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.responsivevoice.org/responsivevoice.js">
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Inter:wght@400;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Jogo em JS</title>
</head>

<body>
    <div class="container__login container">
        <form class="container__conteudo login">
            <h1 class="titulo__login container__texto">Faça seu <span class="container__texto-azul">LOGIN</span></h1>
            <div class="container__informacoes div_login">
                <label class="container__texto" for="username">Usuario: </label>
                <input class="container__input" type="text" name="username" id="username" placeholder="Ex: natanael">
            </div>
            <div class="container__informacoes div_login">
                <label class="container__texto" for="password">Senha: </label>
                <input class="container__input" type="password" name="password" id="password" placeholder="1234">
            </div>
            <p class="erro" id="erro"></p>
            <input type="submit" class="container__botao" style="margin-bottom: 2rem;" >
        </form>
    </div>
    
    <script src="login.js" defer></script>
</body>
